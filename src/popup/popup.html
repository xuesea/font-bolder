<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Font Bolder</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <h1 data-i18n="title">Font Bolder</h1>
    <div class="panel">
      <div class="toggle-row">
        <label for="enabled" data-i18n="enabled">Enable bold and dark text</label>
        <input id="enabled" type="checkbox">
      </div>

      <div class="control">
        <div class="value-row">
          <label for="fontWeight" data-i18n="fontWeight">Boldness</label>
          <span id="fontWeightValue" class="value">600</span>
        </div>
        <input id="fontWeight" type="range" min="400" max="900" step="50">
      </div>

      <div class="control">
        <div class="value-row">
          <label for="darken" data-i18n="darken">Darkness</label>
          <span id="darkenValue" class="value">0.20px</span>
        </div>
        <input id="darken" type="range" min="0" max="0.8" step="0.05">
      </div>

      <p class="hint" data-i18n="hint">Settings are saved automatically and applied early on newly opened pages to reduce visual flicker.</p>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
